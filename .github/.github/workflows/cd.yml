name: CD (manual)

# Deploy tự động: workflow CI/CD → job "CD — Deploy VPS" (sau test pass).
# File này chỉ để deploy tay khi cần.

on:
  workflow_dispatch:

concurrency:
  group: cd-deploy-manual
  cancel-in-progress: true

jobs:
  deploy:
    name: CD — Deploy VPS (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 25m
          script: |
            set -e
            git config --global --add safe.directory /var/www/pbx.xenoai.vn
            cd /var/www/pbx.xenoai.vn
            git fetch origin dev
            git checkout dev
            git reset --hard origin/dev
            chmod +x deploy/deploy.sh
            bash deploy/deploy.sh

      - name: Verify API health
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            for i in $(seq 1 15); do
              if curl -sf http://127.0.0.1:4000/api/v1/auth/health; then
                echo ""
                echo "Deploy OK — https://pbx.xenoai.vn"
                exit 0
              fi
              sleep 2
            done
            echo "API health check failed after deploy"
            systemctl status pbx-ticket-api --no-pager -l || true
            journalctl -u pbx-ticket-api -n 50 --no-pager || true
            exit 1
