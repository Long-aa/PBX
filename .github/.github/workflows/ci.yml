name: CI/CD

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: CI — Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @pbx/shared run build

      - name: Lint
        run: pnpm lint

      - name: Build API
        run: pnpm --filter @pbx/api run build

      - name: Build Web
        run: pnpm --filter @pbx/web run build

  test-api:
    name: CI — API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pbx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pbx_test
      DB_AUTO_SYNC: 'true'
      DB_ENSURE_DATABASE: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @pbx/shared run build

      - name: Build API
        run: pnpm --filter @pbx/api run build

      - name: Unit tests
        run: pnpm --filter @pbx/api run test

      - name: E2E tests
        run: pnpm --filter @pbx/api run test:e2e

  deploy:
    name: CD — Deploy VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test-api
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 25m
          script: |
            set -e
            git config --global --add safe.directory /var/www/pbx.xenoai.vn
            cd /var/www/pbx.xenoai.vn
            git fetch origin dev
            git checkout dev
            git reset --hard origin/dev
            chmod +x deploy/deploy.sh
            bash deploy/deploy.sh

      - name: Verify API health
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            for i in $(seq 1 15); do
              if curl -sf http://127.0.0.1:4000/api/v1/auth/health; then
                echo ""
                echo "Deploy OK — https://pbx.xenoai.vn"
                exit 0
              fi
              sleep 2
            done
            echo "API health check failed after deploy"
            systemctl status pbx-ticket-api --no-pager -l || true
            journalctl -u pbx-ticket-api -n 50 --no-pager || true
            exit 1
